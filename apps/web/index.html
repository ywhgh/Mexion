<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        var t = localStorage.getItem('axion_theme');
        var l = localStorage.getItem('axion_lang');
        document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light';
        document.documentElement.dataset.lang = l === 'en' ? 'en' : 'zh';
        document.documentElement.lang = l === 'en' ? 'en' : 'zh-CN';
        if (localStorage.getItem('axion_sidebar_rail') === '1') document.documentElement.classList.add('axiom-rail-init');
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
        document.documentElement.dataset.lang = 'zh';
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Axion · Vol. I</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
