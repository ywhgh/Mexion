<!DOCTYPE html>
<html lang="zh">
<head>
<script>/* theme FOUC guard — set dark before first paint */(function(){try{var t=localStorage.getItem("mexion_theme");if(t!=="dark"&&t!=="light")t=matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";if(t==="dark")document.documentElement.setAttribute("data-theme","dark")}catch(e){}})();</script>
<meta name="theme-color" content="#F4F3EE">
<meta charset="UTF-8">
<script>/* Sidebar rail FOUC guard — adds .mexion-rail-init before CSS paints when storage says rail (or first visit on small screens). Mirrored in sidebar.js. */(function(){try{var s=localStorage.getItem("mexion_sidebar_rail");var w=window.innerWidth;if(s==="1"||(s==null&&w>860&&w<1180))document.documentElement.classList.add("mexion-rail-init")}catch(e){}})();</script>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mexion — 系统设置</title>
<link rel="stylesheet" href="/assets/fonts.css">
<link rel="preload" href="/assets/common.css" as="style">
<link rel="stylesheet" href="/assets/common.css">
<link rel="stylesheet" href="/assets/api-keys.css">
<script src="/assets/i18n.js"></script>
<script src="/assets/core.js" defer></script>
<script src="/assets/sub2api.js" defer></script>
</head>
<body>
<script>(function(){try{var uid=localStorage.getItem('mexion_user_id')||sessionStorage.getItem('mexion_user_id');if(!uid){location.replace('/sign-in/');return;}if(localStorage.getItem('mexion_user_role')!=='admin'){location.replace('/dashboard/');return;}}catch(e){}})()</script>
<div class="app">
  <aside class="side" id="mexion-sidebar"><div class="side-skel" style="padding:18px 14px;height:100%;display:flex;flex-direction:column"><div style="display:flex;align-items:center;gap:9px;padding:6px 10px 18px"><div style="width:28px;height:28px;border-radius:8px;background:var(--border-2)"></div><div style="width:60px;height:14px;border-radius:4px;background:var(--border-2)"></div></div><div style="display:flex;flex-direction:column;gap:6px;padding:0 4px"><div style="height:32px;border-radius:8px;background:var(--bg-2)"></div><div style="height:32px;border-radius:8px;background:var(--bg-2)"></div><div style="height:32px;border-radius:8px;background:var(--bg-2)"></div><div style="height:32px;border-radius:8px;background:var(--bg-2)"></div><div style="height:1px;background:var(--border-2);margin:8px 0"></div><div style="height:32px;border-radius:8px;background:var(--bg-2)"></div><div style="height:32px;border-radius:8px;background:var(--bg-2)"></div><div style="height:32px;border-radius:8px;background:var(--bg-2)"></div></div></div></aside>
  <script src="/assets/sidebar.js" defer></script>
  <main class="main">
    <header class="topbar">
      <div class="topbar__spacer"></div>
      <div class="topbar__sep" aria-hidden="true"></div>
      <div class="lang-toggle" role="group"><button data-lang="zh" aria-pressed="true">中</button><button data-lang="en" aria-pressed="false">EN</button></div>
      <div class="notif-bell-wrap" style="position:relative"><button class="iconbtn iconbtn--labeled notif-bell" title="通知" data-i18n-title="topbar.notify.title"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6a4 4 0 0 1 8 0c0 2 1 3.5 1.5 4.5H2.5C3 9.5 4 8 4 6z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M6.5 12.5a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg><span data-i18n="topbar.notify.label">通知</span></button></div>
      <div class="user-menu">
        <button class="user" type="button" aria-haspopup="menu" aria-expanded="false" aria-controls="user-menu-panel"><span class="user__avatar" data-mexion-avatar>A</span><span class="user__name" data-mexion-user="name">—</span><svg class="user__caret" width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="2.5,4 5,6.5 7.5,4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button>
        <div class="user-menu__panel" id="user-menu-panel" role="menu" aria-label="账户菜单" hidden>
          <div class="user-menu__head"><div class="user-menu__avatar-lg" data-mexion-avatar aria-hidden="true">A</div><div class="user-menu__id"><div class="user-menu__name" data-mexion-user="name">—</div><div class="user-menu__email" data-mexion-user="email">—</div></div></div>
          <div class="user-menu__list"><a class="user-menu__item" href="/profile/" role="menuitem"><span>个人资料</span></a><a class="user-menu__item" href="/api-keys/" role="menuitem"><span>API 密钥</span></a><div class="user-menu__sep" role="none"></div><button class="user-menu__item user-menu__item--danger" type="button" role="menuitem" data-action="signout"><span>退出登录</span></button></div>
        </div>
      </div>
    </header>

    <div class="page-head fade-in fade-in--1">
      <div class="page-head__left">
        <nav class="page-head__crumb"><a href="/dashboard/">概览</a><span class="sep">/</span><span style="color:var(--ink)">系统设置</span></nav>
        <div class="page-head__title">系统设置</div>
        <div class="page-head__sub" id="resourceSubtitle">GET/PUT /api/v1/admin/settings</div>
      </div>
      <div class="page-head__actions">
        <button class="btn-secondary" id="resourceRefresh" type="button">刷新</button>
        <button class="btn-primary" id="resourceCreate" type="button" hidden>新建</button>
      </div>
    </div>

    <section class="card fade-in fade-in--2">
      <div class="card__head"><span class="card__title">§ 系统设置</span><span class="card__title-meta" id="resourceMeta">sub2api</span></div>
      <div style="padding:16px 18px;border-top:1px solid var(--border);display:grid;gap:14px">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <input id="resourceSearch" class="form-input" placeholder="搜索当前数据…" style="max-width:360px">
          <span class="pill" id="resourceCount"><span class="pill__dot"></span>—</span>
        </div>
        <div id="resourceStats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--border)"></div>
        <div id="resourceList" style="overflow:auto;border:1px solid var(--border)"></div>
      </div>
    </section>

    <section class="card fade-in fade-in--3" style="margin-top:18px">
      <div class="card__head"><span class="card__title">§ 详情</span><span class="card__title-meta" id="detailMeta">选择一行查看 JSON</span></div>
      <pre id="resourceDetail" style="margin:0;padding:18px;overflow:auto;max-height:420px;border-top:1px solid var(--border);font-family:var(--f-mono);font-size:12px;line-height:1.55;background:var(--surface-2);color:var(--ink)">等待数据…</pre>
      <div style="display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--border);flex-wrap:wrap">
        <button class="btn-secondary" id="resourceCopy" type="button">复制 JSON</button>
        <button class="btn-secondary" id="resourceEdit" type="button" >编辑 JSON</button>
        <button class="btn-secondary" id="resourceRun" type="button" hidden>执行测试</button>
        <button class="btn-primary btn-primary--danger" id="resourceDelete" type="button" hidden>删除</button>
      </div>
    </section>
  </main>
</div>

<div class="modal-bg" id="resourceModal" hidden>
  <div class="modal" style="width:min(720px,calc(100vw - 24px))">
    <div class="modal__head"><div><div class="modal__title" id="resourceModalTitle">编辑</div><div class="modal__sub" id="resourceModalSub">直接编辑 sub2api 请求 JSON</div></div><button class="modal__close" id="resourceModalClose" type="button">×</button></div>
    <div class="modal__body"><textarea class="form-input" id="resourceJson" rows="14" style="font-family:var(--f-mono);line-height:1.55;resize:vertical"></textarea></div>
    <div class="modal__foot"><button class="btn-secondary" id="resourceModalCancel" type="button">取消</button><button class="btn-primary" id="resourceModalConfirm" type="button">提交</button></div>
  </div>
</div>

<script>window.MexionResourceConfig={"dir":"admin/settings","title":"系统设置","endpoint":"/admin/settings","objectMode":true,"create":false,"delete":false,"subtitle":"GET/PUT /api/v1/admin/settings"};</script>
<script src="app.js" defer></script>
<script src="/assets/user-menu.js" defer></script>
<script src="/assets/notification.js" defer></script>
<script src="/assets/prefetch.js" defer></script>
</body>
</html>
